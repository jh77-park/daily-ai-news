name: Daily AI News Bot

on:
  schedule:
    # 매일 한국시간 아침 8시 (UTC 기준 밤 11시)
    - cron: '0 23 * * *'
  workflow_dispatch: # 수동 실행을 위한 버튼 활성화

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python main.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add MyWiki/_Inbox/*.md
          # 변경 사항이 있을 경우에만 커밋 및 푸시
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-generate daily news report" && git push)
